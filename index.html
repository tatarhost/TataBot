<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #0a0c10; --card: #161b22; --accent: #2f81f7; --text: #c9d1d9; --code: #7ee787; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, system-ui, sans-serif; margin: 0; padding: 15px; overflow-x: hidden; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; position: sticky; top: 0; background: var(--bg); padding: 5px 0; z-index: 10; }
        .tab { flex: 1; padding: 12px; text-align: center; background: var(--card); border-radius: 10px; cursor: pointer; border: 1px solid #30363d; font-size: 14px; transition: 0.3s; }
        .tab.active { background: var(--accent); color: white; border-color: var(--accent); box-shadow: 0 0 15px rgba(47, 129, 247, 0.4); }
        .content { display: none; animation: fadeIn 0.3s ease; }
        .content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        textarea { width: 100%; height: 250px; background: #010409; color: var(--code); border: 1px solid #30363d; border-radius: 12px; padding: 15px; font-family: 'Consolas', monospace; box-sizing: border-box; font-size: 14px; outline: none; }
        .btn-main { width: 100%; padding: 15px; border: none; border-radius: 12px; background: var(--accent); color: white; font-weight: bold; font-size: 16px; margin-top: 15px; cursor: pointer; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .btn-tool { background: var(--card); border: 1px solid #30363d; color: var(--text); padding: 15px; border-radius: 10px; font-size: 13px; text-align: center; cursor: pointer; }
        .btn-tool:active { background: #21262d; }
    </style>
</head>
<body>
    <div class="tabs">
        <div class="tab active" onclick="openTab(event, 'emu')">🖥 Эмулятор</div>
        <div class="tab" onclick="openTab(event, 'ai')">🤖 AI Чат</div>
        <div class="tab" onclick="openTab(event, 'tools')">🛠 Утилиты</div>
    </div>

    <div id="emu" class="content active">
        <textarea id="code"># Введи свой Python код здесь
print("NEXUS OS v3.0")
for i in range(3):
    print(f"Тест системы... {i+1}")</textarea>
        <button class="btn-main" onclick="sendData('run_code')">🚀 ЗАПУСТИТЬ В ЭМУЛЯТОРЕ</button>
    </div>

    <div id="ai" class="content">
        <textarea id="ai_query" style="height: 150px; color: white;" placeholder="Введите ваш вопрос для ИИ..."></textarea>
        <button class="btn-main" onclick="sendData('ai_ask')" style="background: #238636;">💬 СПРОСИТЬ LLAMA 3.3</button>
    </div>

    <div id="tools" class="content">
        <div class="grid">
            <div class="btn-tool" onclick="sendAction('pass')">🔐 Пароль</div>
            <div class="btn-tool" onclick="sendAction('clear')">🧹 Очистка</div>
            <div class="btn-tool" onclick="sendAction('dice')">🎲 Кубик</div>
            <div class="btn-tool" onclick="sendAction('info')">📊 Статус</div>
            <div class="btn-tool" onclick="sendAction('time')">🕒 Время</div>
            <div class="btn-tool" onclick="sendAction('coin')">🪙 Монетка</div>
        </div>
        <p style="text-align: center; font-size: 12px; color: #8b949e; margin-top: 20px;">Доступно более 100 скрытых команд через ИИ</p>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        function openTab(evt, tabName) {
            let contents = document.getElementsByClassName("content");
            for (let i = 0; i < contents.length; i++) contents[i].classList.remove("active");
            let tabs = document.getElementsByClassName("tab");
            for (let i = 0; i < tabs.length; i++) tabs[i].classList.remove("active");
            document.getElementById(tabName).classList.add("active");
            evt.currentTarget.classList.add("active");
        }

        function sendData(type) {
            let val = type === 'run_code' ? document.getElementById('code').value : document.getElementById('ai_query').value;
            tg.sendData(JSON.stringify({action: type, data: val}));
            tg.close();
        }

        function sendAction(type) {
            tg.sendData(JSON.stringify({action: type}));
            tg.close();
        }
    </script>
</body>
</html>
