<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0b0e14; color: #e2e8f0; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; }
        .tabs { display: flex; gap: 5px; margin-bottom: 15px; background: #1a1f29; padding: 5px; border-radius: 10px; }
        .tab { flex: 1; padding: 10px; text-align: center; cursor: pointer; border-radius: 8px; font-size: 14px; transition: 0.3s; }
        .active { background: #3b82f6; color: white; }
        .content { display: none; background: #161b22; padding: 15px; border-radius: 12px; border: 1px solid #30363d; }
        .show { display: block; }
        textarea { width: 100%; height: 200px; background: #0d1117; color: #7ee787; border: 1px solid #30363d; border-radius: 8px; padding: 10px; font-family: monospace; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; background: #238636; color: white; font-weight: bold; margin-top: 10px; cursor: pointer; }
        .tool-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .tool-btn { background: #21262d; border: 1px solid #30363d; padding: 15px; font-size: 12px; }
    </style>
</head>
<body>
    <div class="tabs">
        <div class="tab active" onclick="openTab('emu')">📟 Эмулятор</div>
        <div class="tab" onclick="openTab('ai')">🤖 AI Чат</div>
        <div class="tab" onclick="openTab('tools')">🛠 Функции</div>
    </div>

    <div id="emu" class="content show">
        <textarea id="pycode">print("Тест системы...")
x = 10
y = 20
print(f"Результат: {x + y}")</textarea>
        <button onclick="send('run_code')">🚀 ЗАПУСТИТЬ ТЕСТ</button>
    </div>

    <div id="ai" class="content">
        <p>Режим общения с Llama 3.3. Введите вопрос в поле ниже и отправьте его боту.</p>
        <textarea id="aitext" placeholder="Напиши вопрос ИИ..."></textarea>
        <button onclick="send('ai_ask')" style="background: #3b82f6;">💬 СПРОСИТЬ ИИ</button>
    </div>

    <div id="tools" class="content">
        <div class="tool-grid">
            <button class="tool-btn" onclick="send('pass')">🔐 Пароль</button>
            <button class="tool-btn" onclick="send('info')">📊 Статус</button>
            <button class="tool-btn" onclick="send('clear')">🧹 Очистка</button>
            <button class="tool-btn" onclick="send('time')">🕒 Время</button>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        function openTab(name) {
            document.querySelectorAll('.content').forEach(c => c.classList.remove('show'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(name).classList.add('show');
            event.currentTarget.classList.add('active');
        }

        function send(action) {
            let data = { action: action };
            if (action === 'run_code') data.code = document.getElementById('pycode').value;
            if (action === 'ai_ask') data.text = document.getElementById('aitext').value;
            
            tg.sendData(JSON.stringify(data)); // Отправляет данные боту
            tg.close(); // Закрывает окно после отправки
        }
    </script>
</body>
</html>
